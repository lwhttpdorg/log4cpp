[binaries]
c = 'mips64-linux-gnuabi64-gcc'
cpp = 'mips64-linux-gnuabi64-g++'
ar = 'mips64-linux-gnuabi64-ar'
strip = 'mips64-linux-gnuabi64-strip'
pkg-config = 'pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'mips64'
cpu = 'mips64'
endian = 'big'

[properties]
pkg_config_libdir = '/usr/lib/aarch64-linux-gnu/pkgconfig'

[built-in options]
c_args = ['-march=mips64']
cpp_args = ['-march=mips64']
c_link_args = ['-march=mips64']
cpp_link_args = ['-march=mips64']
