[binaries]
c = 'arm-linux-gnueabihf-gcc'
cpp = 'arm-linux-gnueabihf-g++'
ar = 'arm-linux-gnueabihf-ar'
strip = 'arm-linux-gnueabihf-strip'
pkgconfig = 'arm-linux-gnueabihf-pkg-config'

[host_machine]
system = 'linux'
cpu_family = 'arm'
cpu = 'armv7-a'
endian = 'little'

[properties]
# sys_root = '/path/to/your/sdk'

[built-in options]
c_args = ['-march=armv7-a', '-mfloat-abi=hard', '-mfpu=neon']
cpp_args = ['-march=armv7-a', '-mfloat-abi=hard', '-mfpu=neon']
c_link_args = ['-march=armv7-a', '-mfloat-abi=hard', '-mfpu=neon']
cpp_link_args = ['-march=armv7-a', '-mfloat-abi=hard', '-mfpu=neon']
